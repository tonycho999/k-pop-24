name: K-Trend Scraper (Hybrid)

on:
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          # Tavily 삭제, Groq 부활, Gemini 유지
          pip install supabase requests groq google-generativeai

      - name: Run Scraper
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          
          # Kobis (영화 API) - 필수 데이터
          KOBIS_API_KEY: ${{ secrets.KOBIS_API_KEY }}
          
          # Gemini (AI) - 현재 메인 파싱/요약 담당
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
          # Groq (AI) - 향후 번역 등 서브 작업용 부활
          GROQ_API_KEY1: ${{ secrets.GROQ_API_KEY1 }}
          GROQ_API_KEY2: ${{ secrets.GROQ_API_KEY2 }}
          GROQ_API_KEY3: ${{ secrets.GROQ_API_KEY3 }}
          GROQ_API_KEY4: ${{ secrets.GROQ_API_KEY4 }}
          GROQ_API_KEY5: ${{ secrets.GROQ_API_KEY5 }}
          GROQ_API_KEY6: ${{ secrets.GROQ_API_KEY6 }}
          GROQ_API_KEY7: ${{ secrets.GROQ_API_KEY7 }}
          GROQ_API_KEY8: ${{ secrets.GROQ_API_KEY8 }}
          
        run: |
          cd scraper
          # 로그 버퍼링 방지를 위해 -u 옵션 추가
          python -u main.py
