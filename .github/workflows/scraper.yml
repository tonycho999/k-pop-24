name: K-Trend Scraper (Hybrid)

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 0 * * *' # 필요시 스케줄 활성화

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          # Tavily 폐기, BeautifulSoup4 추가 (IPRoyal 크롤링용)
          pip install supabase requests beautifulsoup4 groq google-generativeai

      - name: Run Scraper
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          
          # Kobis (영화 API)
          KOBIS_API_KEY: ${{ secrets.KOBIS_API_KEY }}
          
          # Gemini (AI) - 핵심 처리
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
          # IPRoyal Web Unblocker (크롤링 방어막 우회)
          PROXY_HOST: ${{ secrets.PROXY_HOST }}
          PROXY_PORT: ${{ secrets.PROXY_PORT }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
          
          # Groq (AI) - 보존
          GROQ_API_KEY1: ${{ secrets.GROQ_API_KEY1 }}
          GROQ_API_KEY2: ${{ secrets.GROQ_API_KEY2 }}
          GROQ_API_KEY3: ${{ secrets.GROQ_API_KEY3 }}
          GROQ_API_KEY4: ${{ secrets.GROQ_API_KEY4 }}
          GROQ_API_KEY5: ${{ secrets.GROQ_API_KEY5 }}
          GROQ_API_KEY6: ${{ secrets.GROQ_API_KEY6 }}
          GROQ_API_KEY7: ${{ secrets.GROQ_API_KEY7 }}
          GROQ_API_KEY8: ${{ secrets.GROQ_API_KEY8 }}
          
        run: |
          cd scraper
          python -u main.py
