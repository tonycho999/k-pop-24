name: K-Trend Hybrid Scraper

on:
  workflow_dispatch: # 수동 실행

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          # google-generativeai: 제미나이용
          # requests: 영진위 API용
          # supabase: DB 저장용
          pip install supabase requests google-generativeai

      - name: Run Scraper
        env:
          # Supabase
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          
          # Hybrid Keys (Github Secrets에 이 이름으로 저장되어 있어야 함)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KOBIS_API_KEY: ${{ secrets.KOBIS_API_KEY }}
        run: |
          cd scraper
          python main.py
