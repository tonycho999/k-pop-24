name: K-Trend Scraper (Tavily + Groq)

on:
  workflow_dispatch: # 수동 실행 버튼

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          # tavily-python: 뉴스 검색용 (패키지명 주의!)
          # groq: 데이터 요약 및 JSON 변환용
          # supabase: DB 저장용
          # requests: HTTP 요청용
          pip install supabase requests tavily-python groq

      - name: Run Scraper
        env:
          # Supabase DB 설정
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          
          # Tavily API (검색 엔진)
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          
          # Groq API (AI 모델) - 키 8개 매핑 (로테이션 대응)
          GROQ_API_KEY1: ${{ secrets.GROQ_API_KEY1 }}
          GROQ_API_KEY2: ${{ secrets.GROQ_API_KEY2 }}
          GROQ_API_KEY3: ${{ secrets.GROQ_API_KEY3 }}
          GROQ_API_KEY4: ${{ secrets.GROQ_API_KEY4 }}
          GROQ_API_KEY5: ${{ secrets.GROQ_API_KEY5 }}
          GROQ_API_KEY6: ${{ secrets.GROQ_API_KEY6 }}
          GROQ_API_KEY7: ${{ secrets.GROQ_API_KEY7 }}
          GROQ_API_KEY8: ${{ secrets.GROQ_API_KEY8 }}
          
        run: |
          cd scraper
          python main.py
