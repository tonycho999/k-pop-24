name: Hourly News Update (1H)

on:
  workflow_dispatch:
#  schedule:
#    - cron: '11 * * * *' # 매시간 정각에 실행

jobs:
  run-news-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        # 💡 [핵심 수정] groq, google-generativeai 삭제 -> google-genai 로 완벽 교체
        run: |
          python -m pip install --upgrade pip
          pip install supabase requests beautifulsoup4 google-genai pytz

      - name: Run News Scraper
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          
          # 💡 [추가] 구글 이미지 검색용 키 연동
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_SEARCH_CX: ${{ secrets.GOOGLE_SEARCH_CX }}
          
          # 💡 [교체] Groq 키를 빼고 Gemini 키 연동
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          GEMINI_API_KEY2: ${{ secrets.GEMINI_API_KEY2 }}
          GEMINI_API_KEY3: ${{ secrets.GEMINI_API_KEY3 }}
          GEMINI_API_KEY4: ${{ secrets.GEMINI_API_KEY4 }}
          GEMINI_API_KEY5: ${{ secrets.GEMINI_API_KEY5 }}
          GEMINI_API_KEY6: ${{ secrets.GEMINI_API_KEY6 }}
          GEMINI_API_KEY7: ${{ secrets.GEMINI_API_KEY7 }}
          GEMINI_API_KEY8: ${{ secrets.GEMINI_API_KEY8 }}
        run: |
          cd scraper
          python -u main.py news  # 👈 'news' 모드로 실행
